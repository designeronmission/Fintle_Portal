<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome to Fintle</title>
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Lato', sans-serif;
            background-color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 375px;
            height: 812px;
            background-color: #ffffff;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
        }

        .illustration-container {
            width: 100%;
            max-width: 312px;
            height: 312px;
            position: relative;
            margin-bottom: 40px;
            background-color: #f8f9fc;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .illustration {
            width: 280px;
            height: 280px;
            position: relative;
        }

        .illustration svg {
            width: 100%;
            height: 100%;
        }

        .content {
            text-align: center;
            margin-bottom: 60px;
        }

        h1 {
            font-size: 28px;
            font-weight: 700;
            color: #172862;
            margin-bottom: 20px;
            line-height: 1.2;
        }

        .subtitle {
            font-size: 15px;
            font-weight: 400;
            color: #666666;
            line-height: 1.6;
            max-width: 300px;
            margin: 0 auto;
        }

        .pagination {
            display: flex;
            gap: 8px;
            justify-content: center;
            margin-bottom: 50px;
        }

        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: #e1e6f6;
            transition: background-color 0.3s ease;
        }

        .dot.active {
            background-color: #172862;
        }

        .button-container {
            width: 100%;
            max-width: 333px;
            height: 70px;
            background-color: #e1e6f6;
            border-radius: 190px;
            position: relative;
            display: flex;
            padding: 5px;
        }

        .btn {
            flex: 1;
            height: 60px;
            border: none;
            border-radius: 190px;
            font-family: 'Lato', sans-serif;
            font-size: 17px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-signin {
            background-color: #172862;
            color: #ffffff;
            margin-right: 5px;
        }

        .btn-signin:hover {
            background-color: #0f1d45;
        }

        .btn-signup {
            background-color: transparent;
            color: #172862;
        }

        .btn-signup:hover {
            background-color: rgba(23, 40, 98, 0.05);
        }

        @media (max-width: 375px) {
            .container {
                height: auto;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="illustration-container">
            <div class="illustration">
                <svg viewBox="0 0 280 280" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <!-- Calendar Icon -->
                    <rect x="20" y="40" width="50" height="45" rx="4" stroke="#263238" stroke-width="2" fill="none"/>
                    <line x1="30" y1="35" x2="30" y2="45" stroke="#263238" stroke-width="2" stroke-linecap="round"/>
                    <line x1="40" y1="35" x2="40" y2="45" stroke="#263238" stroke-width="2" stroke-linecap="round"/>
                    <line x1="50" y1="35" x2="50" y2="45" stroke="#263238" stroke-width="2" stroke-linecap="round"/>
                    <line x1="60" y1="35" x2="60" y2="45" stroke="#263238" stroke-width="2" stroke-linecap="round"/>
                    
                    <!-- Grid lines for calendar -->
                    <line x1="25" y1="52" x2="65" y2="52" stroke="#263238" stroke-width="1"/>
                    <line x1="25" y1="60" x2="65" y2="60" stroke="#263238" stroke-width="1"/>
                    <line x1="25" y1="68" x2="65" y2="68" stroke="#263238" stroke-width="1"/>
                    <line x1="25" y1="76" x2="65" y2="76" stroke="#263238" stroke-width="1"/>
                    <line x1="33" y1="48" x2="33" y2="82" stroke="#263238" stroke-width="1"/>
                    <line x1="41" y1="48" x2="41" y2="82" stroke="#263238" stroke-width="1"/>
                    <line x1="49" y1="48" x2="49" y2="82" stroke="#263238" stroke-width="1"/>
                    <line x1="57" y1="48" x2="57" y2="82" stroke="#263238" stroke-width="1"/>

                    <!-- Clipboard with Dollar Sign -->
                    <rect x="100" y="30" width="80" height="100" rx="6" fill="#ffffff" stroke="#263238" stroke-width="2.5"/>
                    <rect x="120" y="25" width="40" height="12" rx="6" fill="#8B8D97"/>
                    <circle cx="140" cy="70" r="20" fill="#172862"/>
                    <text x="140" y="80" text-anchor="middle" fill="white" font-size="24" font-weight="bold" font-family="Arial">$</text>
                    <line x1="110" y1="95" x2="130" y2="95" stroke="#263238" stroke-width="1.5"/>
                    <line x1="150" y1="95" x2="170" y2="95" stroke="#263238" stroke-width="1.5"/>
                    <line x1="110" y1="102" x2="170" y2="102" stroke="#263238" stroke-width="1.5"/>
                    <line x1="110" y1="109" x2="170" y2="109" stroke="#263238" stroke-width="1.5"/>
                    <line x1="110" y1="116" x2="145" y2="116" stroke="#263238" stroke-width="1.5"/>

                    <!-- Receipt/Paper with Magnifying Glass -->
                    <rect x="35" y="140" width="60" height="80" rx="4" fill="#ffffff" stroke="#263238" stroke-width="2"/>
                    <line x1="45" y1="150" x2="75" y2="150" stroke="#263238" stroke-width="1.5"/>
                    <line x1="45" y1="157" x2="75" y2="157" stroke="#263238" stroke-width="1.5"/>
                    <line x1="45" y1="164" x2="75" y2="164" stroke="#263238" stroke-width="1.5"/>
                    <line x1="45" y1="171" x2="75" y2="171" stroke="#263238" stroke-width="1.5"/>
                    <line x1="45" y1="178" x2="70" y2="178" stroke="#263238" stroke-width="1.5"/>
                    
                    <!-- Magnifying Glass -->
                    <circle cx="70" cy="195" r="18" fill="none" stroke="#263238" stroke-width="3"/>
                    <line x1="83" y1="208" x2="95" y2="220" stroke="#263238" stroke-width="3" stroke-linecap="round"/>

                    <!-- Calculator -->
                    <rect x="120" y="155" width="70" height="90" rx="6" fill="#ffffff" stroke="#263238" stroke-width="2.5"/>
                    <rect x="127" y="162" width="56" height="20" rx="3" fill="#e1e6f6"/>
                    <g fill="#263238">
                        <rect x="130" y="190" width="12" height="10" rx="2"/>
                        <rect x="147" y="190" width="12" height="10" rx="2"/>
                        <rect x="164" y="190" width="12" height="10" rx="2"/>
                        <rect x="130" y="205" width="12" height="10" rx="2"/>
                        <rect x="147" y="205" width="12" height="10" rx="2"/>
                        <rect x="164" y="205" width="12" height="10" rx="2"/>
                        <rect x="130" y="220" width="12" height="10" rx="2"/>
                        <rect x="147" y="220" width="12" height="10" rx="2"/>
                        <rect x="164" y="220" width="12" height="10" rx="2"/>
                        <rect x="130" y="230" width="12" height="10" rx="2"/>
                    </g>

                    <!-- Stacked Coins -->
                    <g>
                        <ellipse cx="90" cy="238" rx="18" ry="6" fill="#4a5568"/>
                        <rect x="72" y="232" width="36" height="6" fill="#4a5568"/>
                        <ellipse cx="90" cy="232" rx="18" ry="6" fill="#5a6678"/>
                        <ellipse cx="90" cy="226" rx="18" ry="6" fill="#4a5568"/>
                        <rect x="72" y="220" width="36" height="6" fill="#4a5568"/>
                        <ellipse cx="90" cy="220" rx="18" ry="6" fill="#5a6678"/>
                        <ellipse cx="90" cy="214" rx="18" ry="6" fill="#4a5568"/>
                        <rect x="72" y="208" width="36" height="6" fill="#4a5568"/>
                        <ellipse cx="90" cy="208" rx="18" ry="6" fill="#5a6678"/>
                    </g>

                    <!-- Person Left (with laptop) -->
                    <circle cx="35" cy="175" r="8" fill="#FFC1A6"/>
                    <path d="M35 183 L35 210" stroke="#263238" stroke-width="2" stroke-linecap="round"/>
                    <path d="M35 195 L28 205" stroke="#263238" stroke-width="2" stroke-linecap="round"/>
                    <path d="M35 195 L42 205" stroke="#263238" stroke-width="2" stroke-linecap="round"/>
                    <path d="M35 210 L28 225" stroke="#263238" stroke-width="2" stroke-linecap="round"/>
                    <path d="M35 210 L42 225" stroke="#263238" stroke-width="2" stroke-linecap="round"/>
                    <rect x="25" y="200" width="22" height="14" rx="1" fill="#263238"/>
                    <line x1="27" y1="204" x2="45" y2="204" stroke="#e1e6f6" stroke-width="0.5"/>
                    <line x1="27" y1="207" x2="45" y2="207" stroke="#e1e6f6" stroke-width="0.5"/>
                    <line x1="27" y1="210" x2="45" y2="210" stroke="#e1e6f6" stroke-width="0.5"/>

                    <!-- Person Right (with documents) -->
                    <circle cx="245" cy="175" r="8" fill="#FFC1A6"/>
                    <path d="M245 183 L245 210" stroke="#263238" stroke-width="2" stroke-linecap="round"/>
                    <path d="M245 195 L238 205" stroke="#263238" stroke-width="2" stroke-linecap="round"/>
                    <path d="M245 195 L252 205" stroke="#263238" stroke-width="2" stroke-linecap="round"/>
                    <path d="M245 210 L238 225" stroke="#263238" stroke-width="2" stroke-linecap="round"/>
                    <path d="M245 210 L252 225" stroke="#263238" stroke-width="2" stroke-linecap="round"/>
                    <rect x="235" y="195" width="14" height="18" rx="1" fill="#ffffff" stroke="#263238" stroke-width="1.5"/>
                    <line x1="238" y1="199" x2="246" y2="199" stroke="#263238" stroke-width="1"/>
                    <line x1="238" y1="202" x2="246" y2="202" stroke="#263238" stroke-width="1"/>
                    <line x1="238" y1="205" x2="246" y2="205" stroke="#263238" stroke-width="1"/>
                    <line x1="238" y1="208" x2="246" y2="208" stroke="#263238" stroke-width="1"/>

                    <!-- Decorative circles/targets -->
                    <circle cx="230" cy="75" r="28" fill="none" stroke="#e1e6f6" stroke-width="6" opacity="0.4"/>
                    <circle cx="230" cy="75" r="18" fill="none" stroke="#d0d5f0" stroke-width="4" opacity="0.5"/>
                    
                    <!-- Chart bars background -->
                    <rect x="210" y="55" width="8" height="25" fill="#e1e6f6" opacity="0.3"/>
                    <rect x="220" y="45" width="8" height="35" fill="#e1e6f6" opacity="0.3"/>
                    <rect x="230" y="50" width="8" height="30" fill="#e1e6f6" opacity="0.3"/>
                    <rect x="240" y="40" width="8" height="40" fill="#e1e6f6" opacity="0.3"/>
                </svg>
            </div>
        </div>

        <div class="content">
            <h1>Welcome to Fintle</h1>
            <p class="subtitle">Your smart accounting companion to create bills, track sales, and manage purchase reports</p>
        </div>

        <div class="pagination">
            <div class="dot active"></div>
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
        </div>

        <div class="button-container">
            <button class="btn btn-signin" onclick="alert('Sign In clicked')">Sign In</button>
            <button class="btn btn-signup" onclick="alert('Sign Up clicked')">Sign Up</button>
        </div>
    </div>
</body>
</html>
